<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Бронирование столиков</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <span class="navbar-brand">🍽 Ресторан — Бронирование</span>
      <a class="btn btn-outline-light btn-sm" href="/admin">Админ-панель</a>
    </div>
  </nav>

  <main class="container py-4">
    <!-- Авторизация -->
    <section id="authSection">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div id="authAlert" class="alert d-none"></div>
          <div class="row g-3">
            <div class="col-md-6">
              <div class="card">
                <div class="card-header">Вход</div>
                <div class="card-body">
                  <input id="loginUsername" class="form-control mb-2" placeholder="Логин">
                  <input id="loginPassword" type="password" class="form-control mb-2" placeholder="Пароль">
                  <button id="btnLogin" class="btn btn-primary w-100">Войти</button>
                </div>
              </div>
            </div>
            <div class="col-md-6">
              <div class="card">
                <div class="card-header">Регистрация</div>
                <div class="card-body">
                  <input id="regUsername" class="form-control mb-2" placeholder="Логин">
                  <input id="regPassword" type="password" class="form-control mb-2" placeholder="Пароль">
                  <input id="regEmail" class="form-control mb-2" placeholder="Email">
                  <input id="regPhone" class="form-control mb-2" placeholder="Телефон">
                  <button id="btnRegister" class="btn btn-success w-100">Зарегистрироваться</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Основное приложение клиента -->
    <section id="appSection" class="d-none">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 id="userGreeting"></h4>
        <button id="btnLogout" class="btn btn-outline-secondary btn-sm">Выйти</button>
      </div>

      <!-- Схема зала -->
      <div class="card mb-4">
        <div class="card-header">Схема зала</div>
        <div class="card-body">
          <p class="text-muted small">Нажмите «Забронировать» ниже, чтобы выбрать свободный столик на время.</p>
          <div id="hallGrid" class="hall-grid"></div>
        </div>
      </div>

      <!-- Пошаговое бронирование (Builder на сервере) -->
      <div class="card mb-4">
        <div class="card-header">Забронировать столик</div>
        <div class="card-body booking-steps">
          <div id="bookingAlert" class="alert d-none"></div>
          <div class="step-indicator mb-3">
            <span data-step="1" class="active">1</span>
            <span data-step="2">2</span>
            <span data-step="3">3</span>
            <span data-step="4">4</span>
            <small class="text-muted ms-2">Дата → Столик → Контакты → Готово</small>
          </div>

          <!-- Шаг 1: дата и время -->
          <div class="step active" data-step="1">
            <label class="form-label">Дата и время</label>
            <input type="datetime-local" id="bookingDatetime" class="form-control mb-2">
            <label class="form-label">Количество гостей</label>
            <input type="number" id="bookingGuests" class="form-control mb-3" value="2" min="1">
            <button class="btn btn-primary" data-next="2" id="btnFindTables">Найти свободные столики →</button>
          </div>

          <!-- Шаг 2: выбор столика -->
          <div class="step" data-step="2">
            <p>Выберите столик:</p>
            <div id="availableTables" class="hall-grid mb-3"></div>
            <button class="btn btn-secondary" data-prev="1">← Назад</button>
            <button class="btn btn-primary" data-next="3">Далее →</button>
          </div>

          <!-- Шаг 3: контакты -->
          <div class="step" data-step="3">
            <input id="guestName" class="form-control mb-2" placeholder="Ваше имя">
            <input id="guestPhone" class="form-control mb-2" placeholder="Телефон">
            <textarea id="guestComment" class="form-control mb-3" placeholder="Комментарий (необязательно)"></textarea>
            <button class="btn btn-secondary" data-prev="2">← Назад</button>
            <button class="btn btn-primary" data-next="4">Далее →</button>
          </div>

          <!-- Шаг 4: подтверждение -->
          <div class="step" data-step="4">
            <p>Проверьте данные и подтвердите бронь.</p>
            <button class="btn btn-secondary" data-prev="3">← Назад</button>
            <button id="btnCreateBooking" class="btn btn-success">Подтвердить бронь</button>
          </div>
        </div>
      </div>

      <!-- Мои брони -->
      <div class="card">
        <div class="card-header">Мои брони</div>
        <div class="card-body" id="myBookingsList"></div>
      </div>
    </section>
  </main>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/client.js"></script>
</body>
</html>
